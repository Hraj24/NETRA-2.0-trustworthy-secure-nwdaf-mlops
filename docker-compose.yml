services:
  backend:
    container_name: nwdaf-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    networks:
      - nwdaf-net

  frontend:
    container_name: nwdaf-frontend
    build:
      context: ./nwdaf-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://nwdaf-backend:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nwdaf-net

networks:
  nwdaf-net:
    driver: bridge
