services:
  - type: web
    name: netra-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-backend.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: CORS_ORIGINS
        sync: false
